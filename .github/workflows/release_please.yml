name: release-please

# Automates semantic-versioned releases from Conventional Commits on main.
# release-please opens/maintains a "release PR" that bumps the version and
# updates CHANGELOG.md; merging that PR creates a *draft* GitHub Release.
#
# The release is split into three jobs so that release-please never has to
# compute the next release PR before the tag for the current release exists.
# A single release-please invocation does (a) createReleases() for any merged
# release PRs and then (b) createPullRequests() for the next one, in that
# order. When (a) creates a *draft* release no git tag is produced, and the
# manifest's just-updated version has no release-or-tag boundary release-please
# can latch onto, so (b) would open a duplicate (or wrongly-bumped) release PR
# before this workflow has had a chance to tag the merge commit. Splitting
# "release" and "pull request" into separate release-please invocations, with
# tag creation + asset build + publish between them, is the supported escape
# hatch: see release-please-action's `skip-github-release` and
# `skip-github-pull-request` inputs.
#
#   1. release-please  - creates the draft GitHub Release for the just-merged
#      release PR. No PR work in this invocation.
#   2. release-assets  - creates the git tag at the merge commit, runs
#      goreleaser to build the cross-platform binaries, attaches them to the
#      still-draft release, then publishes the release (--draft=false).
#      goreleaser does NOT create its own release (`release.disable: true` in
#      .goreleaser.yaml), so it can never duplicate release-please's.
#   3. release-pr      - now that the tag exists, opens/maintains the *next*
#      release PR with the correct commit boundary. No release work here.
#
# Why draft-first: this repo has GitHub's "Release immutability" enabled, so
# once a release is published its assets/tag cannot be modified. Building
# everything while the release is still a draft (assets attach fine to
# drafts), and only then flipping it to published, is GitHub's recommended
# pattern for immutable releases.
#
# Splitting into three jobs means a goreleaser failure never blocks the tag or
# release record: job 1 always completes, job 2 can be retried independently
# until the binaries attach and the release is published, and job 3 only runs
# after both have settled.

on:
  push:
    branches:
      - main

# Avoid overlapping runs racing to update the release PR.
concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    # Release-only invocation: tag any merged release PR as a draft GitHub
    # Release. Must NOT call createPullRequests() here, because the tag for
    # the release it just produced does not exist yet (drafts have no tag)
    # and a same-run createPullRequests() would then open a duplicate PR.
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the draft Release record
      pull-requests: write # comment on / re-label the merged release PR
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      release_sha: ${{ steps.release.outputs.sha }}
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-github-pull-request: true

  release-assets:
    # Only run when release-please just created a release (i.e. the release PR
    # was merged). Ordinary pushes to main skip this job, so the PR-only
    # invocation (release-pr) can still run with the existing tag set.
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the git tag, upload binaries, publish the release
    env:
      TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
      RELEASE_SHA: ${{ needs.release-please.outputs.release_sha }}
    steps:
      # Check out the commit release-please just tagged. Use release-please's
      # `sha` output (the canonical release commit) rather than github.sha
      # so that the tag is pinned to exactly the commit release-please
      # produced, even if a concurrent push has moved the branch ref. Full
      # history is needed so goreleaser can read tags via `git describe`.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ env.RELEASE_SHA }}
          fetch-depth: 0

      # release-please created a *draft* release, which means no git tag was
      # created. The tag has to exist in two places before goreleaser runs:
      #   - locally, because goreleaser derives the version from `git describe`
      #     on the checked-out repo (a remote-only tag is invisible to it);
      #   - remotely, pinned to the release SHA, so the published release
      #     points at the right commit rather than relying on publish-time tag
      #     creation from a moving branch ref.
      # The remote ref is created via the GitHub API because the checkout used
      # persist-credentials: false, so `git push` has no auth. Both steps are
      # made idempotent so this job can be safely re-run after a failure.
      - name: Create git tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          git tag --force "$TAG_NAME" "$RELEASE_SHA"

          # Probe the remote for the tag. `gh api` returns the error body on
          # 404, so we discard any non-SHA output with `// empty` and capture
          # the subshell's status separately: a 404 must NOT be confused with
          # "the tag exists at a different SHA". `|| true` only swallows the
          # exit code; the stdout capture is what we test.
          tag_get_status=0
          existing_sha="$(
            gh api "repos/${GITHUB_REPOSITORY}/git/refs/tags/${TAG_NAME}" \
              --jq '.object.sha // empty' 2>/dev/null
          )" || tag_get_status=$?

          # status 0 + empty string  -> tag does not exist (404 body has no .object.sha)
          # status 0 + non-empty sha  -> tag exists, capture its SHA
          # status != 0               -> transport / API error, fail loud
          if [ "$tag_get_status" -ne 0 ]; then
            echo "::error::Failed to query remote tag ${TAG_NAME} (gh api exit ${tag_get_status})"
            exit 1
          fi

          if [ -n "$existing_sha" ]; then
            if [ "$existing_sha" != "$RELEASE_SHA" ]; then
              echo "::error::Tag ${TAG_NAME} exists at ${existing_sha}, expected ${RELEASE_SHA}"
              exit 1
            fi

            echo "Remote tag ${TAG_NAME} already points at ${RELEASE_SHA}; leaving it in place."
          else
            gh api \
              --method POST \
              "repos/${GITHUB_REPOSITORY}/git/refs" \
              -f ref="refs/tags/${TAG_NAME}" \
              -f sha="${RELEASE_SHA}" \
              --silent

            echo "Created remote tag ${TAG_NAME} at ${RELEASE_SHA}."
          fi

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          cache: false
          go-version-file: go.mod

      # goreleaser only BUILDS the archives + checksums into ./dist. It does not
      # create a GitHub Release (`release.disable: true` in .goreleaser.yaml), so
      # it can never produce a duplicate release competing with release-please's.
      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Attach the freshly built artifacts to release-please's *draft* release
      # (matched by tag; gh resolves drafts too). Drafts accept asset uploads
      # even with immutable releases enabled. --clobber makes re-runs idempotent.
      - name: Attach binaries to draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$TAG_NAME" \
            dist/*.tar.gz \
            dist/*.zip \
            dist/checksums.txt \
            --clobber

      # All assets are attached; flip the release from draft to published.
      # This is the transition that engages immutability — after this runs,
      # the release's assets and tag can no longer be modified. Guard on the
      # current draft state so a re-run doesn't try to edit an already-published
      # (now immutable) release.
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "$(gh release view "$TAG_NAME" --json isDraft --jq .isDraft)" = "true" ]; then
            gh release edit "$TAG_NAME" --draft=false
          else
            echo "Release ${TAG_NAME} is already published; nothing to do."
          fi

  release-pr:
    # PR-only invocation. Runs on every push to main, but only after the
    # release work (if any) has settled, so that release-please can see the
    # tag it just produced and compute the correct commit boundary for the
    # *next* release PR. On ordinary pushes release-assets is skipped and
    # release-pr simply opens/updates the rolling release PR.
    needs:
      - release-please
      - release-assets
    if: >-
      ${{
        always() &&
        needs.release-please.result == 'success' &&
        (
          needs.release-assets.result == 'success' ||
          needs.release-assets.result == 'skipped'
        )
      }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the release branch back to the repo
      pull-requests: write # open/maintain the release PR
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          skip-github-release: true
