name: release-please

on:
  push:
    branches:
      - main

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write

    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  release-assets:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}

    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      TAG_NAME: ${{ needs.release-please.outputs.tag_name }}

    steps:
      # force-tag-creation ensures this tag already exists remotely.
      # Checking out the tag gives GoReleaser the exact tagged source tree.
      - name: Checkout release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ env.TAG_NAME }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          cache: false
          go-version-file: go.mod

      # GoReleaser builds only. release.disable is true in .goreleaser.yaml.
      - name: Build release artifacts
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Attach binaries to draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          gh release upload "$TAG_NAME" \
            dist/*.tar.gz \
            dist/*.zip \
            dist/checksums.txt \
            --clobber

      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          is_draft="$(
            gh release view "$TAG_NAME" \
              --json isDraft \
              --jq '.isDraft'
          )"

          if [ "$is_draft" = "true" ]; then
            gh release edit "$TAG_NAME" --draft=false
          else
            echo "Release ${TAG_NAME} is already published."
          fi
