name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

# Cancel superseded runs on the same ref (but never cancel main).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: jdx/mise-action@v4.1.0
      - uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-
      - name: Build
        run: go build ./...
      - name: Test (race)
        run: go test -race ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: jdx/mise-action@v4.1.0
      - uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-
      - name: golangci-lint
        run: golangci-lint run ./...

  modernize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: jdx/mise-action@v4.1.0
      - uses: actions/cache@v5.0.5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-
      # Fails the build if any modernization is missing; run `task modernize` to fix.
      - name: Check modernization
        run: go run golang.org/x/tools/go/analysis/passes/modernize/cmd/modernize ./...
