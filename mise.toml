# Pinned developer toolchain (https://mise.jdx.dev).
#
# New machine / fresh clone:
#   mise install        # installs the exact tool versions below
#   task setup          # wires the git hooks (lefthook install)
#
# CI installs these same versions via jdx/mise-action, so local and CI agree.

[tools]
go = "1.26.3"
golangci-lint = "2.12.2"
gotestsum = "1.13.0"
actionlint = "1.7.12"
"go:golang.org/x/vuln/cmd/govulncheck" = "v1.1.4"
zizmor = "1.26.1"
lefthook = "1.13.6"
gofumpt = "0.10.0"
task = "3.51.1"
