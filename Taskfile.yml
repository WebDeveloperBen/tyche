version: "3"

dotenv: [".env"]

tasks:
  default:
    cmds:
      - task dev

  setup:
    desc: Wire git hooks for a fresh clone (run after `mise install`)
    cmds:
      - mise install
      - lefthook install

  # cmd/api is a local, gitignored dev harness for iterating on the library.
  # This scaffolds a starter only when it's missing, so a fresh clone can
  # `task dev` immediately without the harness ever being committed.
  scaffold:
    internal: true
    status:
      - test -f cmd/api/main.go
    cmds:
      - mkdir -p cmd/api
      # A single-file main.go: types, routes, and main() all in package main.
      # tyche keys main-package codecs under "main" (matching runtime
      # reflect), so this works end to end.
      - |
        cat > cmd/api/main.go <<'GOEOF'
        // Command api is a local, gitignored dev harness for iterating on tyche.
        // Regenerate it any time with `task scaffold:force`.
        package main

        import (
        	"context"
        	"log"
        	"net/http"

        	"github.com/webdeveloperben/tyche/server"
        	"github.com/webdeveloperben/tyche/server/apidocs"
        	"github.com/webdeveloperben/tyche/server/plugins"
        )

        type GreetInput struct {
        	Name string `path:"name"`
        }

        type GreetOutput struct {
        	Body struct {
        		Message string `json:"message"`
        	}
        }

        func greet(_ context.Context, in *GreetInput) (*GreetOutput, error) {
        	out := &GreetOutput{}
        	out.Body.Message = "hello, " + in.Name
        	return out, nil
        }

        func main() {
        	api := server.NewAPI(server.NewServeMuxAdapter(), server.APIConfig{
        		OpenAPI: server.OpenAPIInfo{Title: "tyche dev", Version: "0.0.0"},
        	})
        	api.Use(plugins.Recoverer(), plugins.RequestID())

        	server.Register(api.Group("/api/v1"), server.Operation{
        		OperationID: "greet-user",
        		Method:      http.MethodGet,
        		Path:        "/greet/:name",
        	}, greet)

        	docs := apidocs.Config{SpecPath: "/openapi.json"}
        	docs.UIs = append(docs.UIs, apidocs.UIMount{Path: "/docs", Renderer: apidocs.Scalar()})
        	if err := apidocs.Mount(api, docs); err != nil {
        		log.Fatal(err)
        	}

        	log.Println("dev api on :8080 (docs: http://localhost:8080/docs)")
        	if err := server.New(server.DefaultConfig(":8080"), api).Run(); err != nil {
        		log.Fatal(err)
        	}
        }
        GOEOF
      - echo "scaffolded cmd/api/main.go (gitignored) — edit it freely"

  scaffold:force:
    desc: Overwrite the local dev harness with a fresh scaffold
    cmds:
      - rm -f cmd/api/main.go
      - task: scaffold

  build:
    desc: Regenerate codecs and build the dev API binary
    deps: [scaffold]
    cmds:
      - mkdir -p "{{.TASK_DIR}}/bin"
      - go run ./cmd/tyche generate ./...
      - go build -o "{{.TASK_DIR}}/bin/api" ./cmd/api

  dev:
    desc: Hot-reload the dev API with Air (regenerates codecs on each build)
    deps: [scaffold]
    cmds:
      - air -c .air.toml

  run:
    desc: Regenerate codecs and run the dev API once
    deps: [scaffold]
    cmds:
      - go run ./cmd/tyche generate ./...
      - go run ./cmd/api

  clean:
    desc: Remove local build and temporary worktree artefacts
    cmds:
      - rm -rf ./bin ./tmp

  tests:
    desc: Run all Go tests against a temporary generated worktree
    cmds:
      - gotestsum -- ./...

  modernize:
    desc: Apply Go modernization fixes (min/max, slices, range-over-int, etc.) across the module
    cmds:
      - go run golang.org/x/tools/go/analysis/passes/modernize/cmd/modernize -fix ./...

  modernize:check:
    desc: Report Go modernization opportunities without applying them (useful in CI)
    cmds:
      - go run golang.org/x/tools/go/analysis/passes/modernize/cmd/modernize ./...

  # Each lefthook pre-commit step has a matching task in the `verify` namespace.
  # Run one when a `task verify` fails to see the full output of that step.
  # `task verify` runs them all in sequence; leftmost fixers first so the
  # verification steps read source in its post-format state.

  verify:fmt:
    desc: Format all Go files with gofumpt (lefthook's gofumpt step)
    cmds:
      - gofumpt -w .

  verify:modernize:
    desc: Apply Go modernization fixes (lefthook's modernize step)
    cmds:
      - go run golang.org/x/tools/go/analysis/passes/modernize/cmd/modernize -fix ./...

  verify:build:
    desc: Compile the whole module (lefthook's verify.build)
    cmds:
      - go build ./...

  verify:lint:
    desc: Run the full linter set (lefthook's verify.lint)
    cmds:
      - golangci-lint run ./...

  verify:test:
    desc: Run the full test suite directly (lefthook's verify.test; for the worktree version, use `task tests`)
    cmds:
      - go test ./...

  verify:cli:
    desc: "Smoke-test the tyche CLI: --help, --version, completion, and one subcommand per verb through a tmpdir"
    cmds:
      - go build -o "{{.TASK_DIR}}/bin/tyche" ./cmd/tyche
      - "{{.TASK_DIR}}/bin/tyche --help"
      - "{{.TASK_DIR}}/bin/tyche version"
      - "{{.TASK_DIR}}/bin/tyche completion bash > /dev/null"
      - "{{.TASK_DIR}}/bin/tyche completion zsh > /dev/null"
      - "{{.TASK_DIR}}/bin/tyche completion fish > /dev/null"
      - |
        set -e
        CLI="{{.TASK_DIR}}/bin/tyche"
        WORK=$(mktemp -d)
        trap "rm -rf $WORK" EXIT
        cd "$WORK"
        $CLI init --module github.com/acme/api/client --yes --root .
        test -f tyche.json
        $CLI config show --quiet --root . > /dev/null
        $CLI config show --format=json --quiet --root . | grep -q '"version"'
        # `build` with no --output must exit non-zero. Its error goes to stderr
        # by design; silence it here so the expected failure doesn't look like a
        # real one in the log, and assert the exit code instead.
        if $CLI build --root . > /dev/null 2>&1; then
          echo "FAIL: 'tyche build' without --output should exit non-zero" >&2
          exit 1
        fi
        echo "ok: 'tyche build' without --output correctly exits non-zero"

  verify:
    desc: Run every lefthook pre-commit check in sequence; exit on the first failure
    cmds:
      - task: verify:fmt
      - task: verify:modernize
      - task: verify:build
      - task: verify:lint
      - task: verify:test
      - task: verify:cli

  benchmark:regen-fixtures:
    desc: Regenerate benchmark fixture codecs
    cmds:
      - go run ./cmd/tyche generate ./servergen/testdata/samplepkg/...

  benchmark:
    desc: Regenerate benchmark fixtures and run the benchmark suite
    cmds:
      - task benchmark:regen-fixtures
      - GOCACHE="{{.TASK_DIR}}/.gocache" go test -run '^$' -bench 'Benchmark(Router_|TypedRoute_)' -benchmem ./server

  benchmark:comparison:
    desc: Regenerate benchmark fixtures and run the cross-framework comparison benchmarks (in the comparison sub-module)
    cmds:
      - task benchmark:regen-fixtures
      - cd benchmarks/comparison && GOCACHE="{{.TASK_DIR}}/.gocache" go test -run '^$' -bench 'BenchmarkRouter_(Static|Param|Body|Nested)$' -benchmem ./...
