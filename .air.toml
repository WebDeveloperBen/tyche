root = "."
tmp_dir = "tmp/air"

[build]
cmd = "go run ./cmd/tyche generate ./... && go build -o ./tmp/air/api ./cmd/api"
bin = "./tmp/air/api"
entrypoint = "./tmp/air/api"
full_bin = "./tmp/air/api"
include_ext = ["go", "tpl", "tmpl", "html", "env"]
exclude_dir = ["tmp", "bin", ".git"]
exclude_regex = ["zz_server_routes_gen\\.go"]
delay = 300
stop_on_error = true
send_interrupt = true
kill_delay = 500

[screen]
clear_on_rebuild = false
